<div
  class="modal fade"
  [class.show]="isOpen()"
  [style.display]="isOpen() ? 'flex' : 'none'"
  tabindex="-1"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-4">Delete {{ goal().name }}? </h5>
        <button type="button" class="btn-close" (click)="onCancel()"></button>
      </div>
      <div class="modal-body text-5">
        This will permanently delete this goal and all its deposit history. This cannot be undone.
      </div>
      <div class="modal-footer">
        <app-button-tertiary type="button" class="btn btn-secondary no-icon black" (click)="onCancel()">Cancel</app-button-tertiary>
        <app-button-tertiary type="button" class="btn btn-danger no-icon red" (click)="onConfirm()">Delete Goal</app-button-tertiary>
      </div>
    </div>
  </div>
</div>
@if (isOpen()) {
  <div class="modal-backdrop fade" [class.show]="isOpen()"></div>
}
