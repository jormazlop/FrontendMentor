@if (logs().length) {
  <div class="text-4 log-header">
    <span class="log-header-title">CONVERSION LOG</span>
    <span class="text-5 log-header-logged">{{ logs().length }} LOGGED</span>
    <foreign-clear-log-button (clickedClearLog)="onClickClearAllLogs()" />
  </div>
  <foreign-log-list />
} @else {
  <div class="logs-no-data">
    <h2 class="text-2">No conversions logged yet</h2>
    <span class="text-3">
      Every conversion is recorded here automatically when you tap LOG CONVERSION. Your log is
      private to this session and this browser.
    </span>
  </div>
}
