<div
  class="modal fade modal-lg"
  [class.show]="isOpen()"
  [style.display]="isOpen() ? 'flex' : 'none'"
  tabindex="-1"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-4">Edit Goal</h5>
        <button type="button" class="btn-close" (click)="onCancel()"></button>
      </div>
      <div class="modal-body text-5">
        <app-input-amount name="target" label="Amount" [field]="form.target" placeholder="0.00" />
        <app-input-text
          name="name"
          label="Note (optional)"
          [field]="form.name"
          placeholder="e.g. Monthly savings"
        />
      </div>
      <div class="modal-footer">
        <app-button-tertiary
          type="button"
          class="btn btn-secondary no-icon black"
          (click)="onCancel()"
          >Cancel</app-button-tertiary
        >
        <app-button-primary
          type="button"
          class="btn btn-danger no-icon"
          (click)="onConfirm()"
          >Save Changes</app-button-primary
        >
      </div>
    </div>
  </div>
</div>
@if (isOpen()) {
  <div class="modal-backdrop fade" [class.show]="isOpen()"></div>
}
